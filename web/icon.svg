<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Kessler Time app icon: calendar on dark, accent dot = "the event" -->
  <rect width="512" height="512" rx="100" fill="#0e0f13"/>
  <!-- calendar body -->
  <rect x="88" y="136" width="336" height="296" rx="36" fill="#ffcf5c"/>
  <!-- header band -->
  <path d="M88 172a36 36 0 0 1 36-36h264a36 36 0 0 1 36 36v52H88z" fill="#f2b733"/>
  <!-- binder rings -->
  <rect x="152" y="84" width="36" height="96" rx="18" fill="#f2f3f7"/>
  <rect x="324" y="84" width="36" height="96" rx="18" fill="#f2f3f7"/>
  <!-- date grid -->
  <circle cx="168" cy="288" r="22" fill="#0e0f13" opacity=".82"/>
  <circle cx="256" cy="288" r="22" fill="#0e0f13" opacity=".82"/>
  <circle cx="344" cy="288" r="22" fill="#0e0f13" opacity=".82"/>
  <circle cx="168" cy="368" r="22" fill="#0e0f13" opacity=".82"/>
  <!-- today's event -->
  <circle cx="256" cy="368" r="30" fill="#7aa2ff"/>
  <circle cx="344" cy="368" r="22" fill="#0e0f13" opacity=".82"/>
</svg>
