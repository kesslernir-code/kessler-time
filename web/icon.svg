<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Kessler Time app icon: calendar + wordmark -->
  <rect width="512" height="512" rx="100" fill="#0e0f13"/>
  <!-- calendar body -->
  <rect x="128" y="104" width="256" height="232" rx="28" fill="#ffcf5c"/>
  <!-- header band -->
  <path d="M128 132a28 28 0 0 1 28-28h200a28 28 0 0 1 28 28v44H128z" fill="#f2b733"/>
  <!-- binder rings -->
  <rect x="176" y="64" width="28" height="76" rx="14" fill="#f2f3f7"/>
  <rect x="308" y="64" width="28" height="76" rx="14" fill="#f2f3f7"/>
  <!-- date grid -->
  <circle cx="192" cy="226" r="17" fill="#0e0f13" opacity=".82"/>
  <circle cx="256" cy="226" r="17" fill="#0e0f13" opacity=".82"/>
  <circle cx="320" cy="226" r="17" fill="#0e0f13" opacity=".82"/>
  <circle cx="192" cy="288" r="17" fill="#0e0f13" opacity=".82"/>
  <!-- today's event -->
  <circle cx="256" cy="288" r="23" fill="#7aa2ff"/>
  <circle cx="320" cy="288" r="17" fill="#0e0f13" opacity=".82"/>
  <!-- wordmark -->
  <text x="256" y="438" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="66" font-weight="bold" letter-spacing="0">
    <tspan fill="#f2f3f7">Kess</tspan><tspan fill="#ffcf5c">Time</tspan>
  </text>
</svg>
